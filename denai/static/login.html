<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DenAI 🐺 — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-primary: #0a0a0f;
  --bg-card: #16161e;
  --bg-card-hover: #1c1c26;
  --bg-input: #1a1a24;
  --accent: #21c25e;
  --accent-hover: #1daf53;
  --accent-dim: rgba(33, 194, 94, 0.12);
  --accent-dim-border: rgba(33, 194, 94, 0.25);
  --text-primary: #e4e4e7;
  --text-secondary: #a1a1aa;
  --text-tertiary: #71717a;
  --text-muted: #52525b;
  --border: #27272a;
  --border-light: #3f3f46;
  --danger: #ef4444;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Background gradient animation */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 30%, rgba(33, 194, 94, 0.06) 0%, transparent 70%),
    radial-gradient(ellipse 500px 350px at 80% 70%, rgba(33, 194, 94, 0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.login-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px 32px 36px;
  box-shadow: var(--shadow-lg);
  animation: cardSlideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes cardSlideIn {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.97);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.login-icon {
  font-size: 52px;
  text-align: center;
  margin-bottom: 16px;
  animation: wolfFloat 3s ease-in-out infinite;
}

@keyframes wolfFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.login-title {
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), #4ade80);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}

.login-subtitle {
  text-align: center;
  font-size: 14px;
  color: var(--text-tertiary);
  margin-bottom: 32px;
  line-height: 1.5;
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.input-wrapper .icon {
  position: absolute;
  left: 14px;
  color: var(--text-muted);
  pointer-events: none;
  display: flex;
  align-items: center;
}

.input-wrapper .icon svg {
  width: 18px;
  height: 18px;
}

.form-input {
  width: 100%;
  padding: 14px 16px 14px 44px;
  background: var(--bg-input);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 14px;
  letter-spacing: 1px;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  outline: none;
}

.form-input::placeholder {
  color: var(--text-muted);
  font-family: 'Inter', sans-serif;
  letter-spacing: normal;
}

.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(33, 194, 94, 0.1);
}

.form-input.error {
  border-color: var(--danger);
  box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
}

.toggle-password {
  position: absolute;
  right: 12px;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  transition: color var(--transition-fast);
}

.toggle-password:hover {
  color: var(--text-secondary);
}

.toggle-password svg {
  width: 18px;
  height: 18px;
}

.btn-login {
  width: 100%;
  padding: 14px 24px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--radius-md);
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast);
}

.btn-login:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(33, 194, 94, 0.3);
}

.btn-login:active {
  transform: translateY(0);
  box-shadow: none;
}

.btn-login:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn-login .spinner {
  display: none;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

.btn-login.loading .spinner {
  display: block;
}

.btn-login.loading .btn-text {
  display: none;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.error-message {
  display: none;
  margin-top: 16px;
  padding: 12px 14px;
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: var(--radius-sm);
  color: #fca5a5;
  font-size: 13px;
  line-height: 1.5;
  animation: shakeIn 0.4s ease;
}

.error-message.visible {
  display: block;
}

@keyframes shakeIn {
  0% { transform: translateX(-8px); opacity: 0; }
  25% { transform: translateX(6px); }
  50% { transform: translateX(-4px); }
  75% { transform: translateX(2px); }
  100% { transform: translateX(0); opacity: 1; }
}

.hint {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.6;
}

.hint code {
  background: rgba(255, 255, 255, 0.06);
  padding: 2px 7px;
  border-radius: 4px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 11.5px;
  color: var(--text-tertiary);
}

/* Responsive */
@media (max-width: 480px) {
  .login-card {
    padding: 32px 24px 28px;
  }

  .login-icon {
    font-size: 44px;
  }

  .login-title {
    font-size: 24px;
  }
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-icon">🐺</div>
    <h1 class="login-title">DenAI</h1>
    <p class="login-subtitle">Digite sua chave de acesso para continuar</p>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="apiKeyInput">Chave de Acesso</label>
        <div class="input-wrapper">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </span>
          <input
            type="password"
            class="form-input"
            id="apiKeyInput"
            placeholder="Cole sua chave aqui..."
            autocomplete="off"
            spellcheck="false"
            required
          >
          <button type="button" class="toggle-password" id="togglePassword" title="Mostrar/ocultar chave">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <span class="btn-text">Entrar</span>
        <span class="spinner"></span>
      </button>

      <div class="error-message" id="errorMessage">
        Chave de acesso inválida. Verifique e tente novamente.
      </div>
    </form>

    <div class="hint">
      💡 A chave está em <code>~/.denai/api.key</code><br>
      no computador onde o DenAI está instalado.
    </div>
  </div>
</div>

<script>
const $form = document.getElementById('loginForm');
const $input = document.getElementById('apiKeyInput');
const $btn = document.getElementById('btnLogin');
const $error = document.getElementById('errorMessage');
const $toggle = document.getElementById('togglePassword');
const $eyeIcon = document.getElementById('eyeIcon');

let passwordVisible = false;

// Toggle password visibility
$toggle.addEventListener('click', () => {
  passwordVisible = !passwordVisible;
  $input.type = passwordVisible ? 'text' : 'password';
  $eyeIcon.innerHTML = passwordVisible
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
});

// Clear error on input
$input.addEventListener('input', () => {
  $error.classList.remove('visible');
  $input.classList.remove('error');
});

// Submit
$form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const key = $input.value.trim();
  if (!key) {
    $input.classList.add('error');
    $input.focus();
    return;
  }

  // Loading state
  $btn.classList.add('loading');
  $btn.disabled = true;
  $error.classList.remove('visible');
  $input.classList.remove('error');

  try {
    const res = await fetch('/api/models', {
      headers: { 'X-API-Key': key }
    });

    if (res.ok) {
      // Set cookie: denai_key, path=/, max-age=1 year, SameSite=Strict
      const maxAge = 365 * 24 * 60 * 60; // 1 year in seconds
      document.cookie = `denai_key=${encodeURIComponent(key)}; path=/; max-age=${maxAge}; SameSite=Strict`;

      // Reload to main UI
      window.location.reload();
    } else {
      $error.classList.add('visible');
      $input.classList.add('error');
      $input.focus();
      $input.select();
    }
  } catch (err) {
    $error.textContent = 'Não foi possível conectar ao servidor. Verifique se ele está rodando.';
    $error.classList.add('visible');
    $input.classList.add('error');
  } finally {
    $btn.classList.remove('loading');
    $btn.disabled = false;
  }
});

// Auto-focus
$input.focus();
</script>
</body>
</html>
