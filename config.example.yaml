# DenAI configuration file
# Copy to ~/.denai/config.yaml to customize.
#
# Priority: CLI args > environment variables > config.yaml > defaults
# All fields are optional — only set what you want to override.

# Ollama model to use
model: llama3.1:8b

# Ollama server URL
ollama_url: http://localhost:11434

# Web UI port
port: 4078

# Allow LAN access (bind to 0.0.0.0)
share: false

# Max tool-call rounds per request
max_tool_rounds: 25

# Max context window (tokens)
max_context: 65536

# ─── Permissions ───────────────────────────────────────────
# Control which tools need confirmation before executing.
# Levels: allow (auto-execute), ask (confirm first), deny (blocked)
# Default: read tools = allow, write tools = ask
# You can also use ~/.denai/permissions.yaml for overrides.
#
# permissions:
#   file_read: allow
#   file_write: ask
#   file_edit: ask
#   command_exec: ask
#   grep: allow
#   think: allow
#   memory_save: allow
#   web_search: allow

# ─── MCP Servers ──────────────────────────────────────────
# Model Context Protocol servers — external tools for the LLM.
# Each server runs as a subprocess communicating via stdio (JSON-RPC 2.0).
# Tools discovered from connected servers are automatically available to the AI.
#
# mcp_servers:
#   filesystem:
#     command: npx
#     args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/projects"]
#     enabled: true
#   web_search:
#     command: python
#     args: ["-m", "web_search_mcp"]
#     env:
#       API_KEY: "your-key-here"
#     enabled: true
