# DenAI configuration file
# Copy to ~/.denai/config.yaml to customize.
#
# Priority: CLI args > environment variables > config.yaml > defaults
# All fields are optional — only set what you want to override.

# Ollama model to use
model: llama3.1:8b

# Ollama server URL
ollama_url: http://localhost:11434

# Web UI port
port: 4078

# Allow LAN access (bind to 0.0.0.0)
share: false

# Max tool-call rounds per request
max_tool_rounds: 25

# Max context window (tokens)
max_context: 65536

# ─── Permissions ───────────────────────────────────────────
# Control which tools need confirmation before executing.
# Levels: allow (auto-execute), ask (confirm first), deny (blocked)
# Default: read tools = allow, write tools = ask
# You can also use ~/.denai/permissions.yaml for overrides.
#
# permissions:
#   file_read: allow
#   file_write: ask
#   file_edit: ask
#   command_exec: ask
#   grep: allow
#   think: allow
#   memory_save: allow
#   web_search: allow

# ─── MCP Servers ──────────────────────────────────────────
# Model Context Protocol servers — external tools for the LLM.
# Each server runs as a subprocess communicating via stdio (JSON-RPC 2.0).
# Tools discovered from connected servers are automatically available to the AI.
#
# mcp_servers:
#   filesystem:
#     command: npx
#     args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/projects"]
#     enabled: true
#   web_search:
#     command: python
#     args: ["-m", "web_search_mcp"]
#     env:
#       API_KEY: "your-key-here"
#     enabled: true

# ─── Providers (LLMs alternativos) ────────────────────────────────
# Além do Ollama local (padrão), você pode conectar outros providers.
# Providers adicionados pela UI são salvos em ~/.denai/providers.yaml.
# Use esta seção para pré-configurar providers via arquivo (CI/CD, dotfiles).
#
# Tipos suportados:
#   - ollama     → Ollama local ou remoto
#   - openai     → OpenAI, Anthropic, Gemini, OpenRouter, Groq, LM Studio, LocalAI
#   - gpt4all    → GPT4All local
#
# providers:
#   - name: OpenAI
#     kind: openai
#     base_url: https://api.openai.com
#     api_key: sk-...          # Nunca commite com API key real!
#     models:
#       - gpt-4o
#       - gpt-4o-mini
#
#   - name: Anthropic
#     kind: openai             # Anthropic suporta endpoint OpenAI-compat
#     base_url: https://api.anthropic.com/v1
#     api_key: sk-ant-...
#     models:
#       - claude-3-5-sonnet-20241022
#       - claude-3-5-haiku-20241022
#
#   - name: LM Studio
#     kind: openai
#     base_url: http://localhost:1234
#     # api_key não necessário para providers locais
#
#   - name: Groq
#     kind: openai
#     base_url: https://api.groq.com/openai/v1
#     api_key: gsk_...
#     models:
#       - llama-3.1-70b-versatile
