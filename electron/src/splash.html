<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <title>DenAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      user-select: none;
      border-radius: 12px;
      overflow: hidden;
    }

    .logo {
      font-size: 64px;
      line-height: 1;
      filter: drop-shadow(0 0 20px rgba(99,179,237,0.4));
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #e6edf3;
      letter-spacing: 0.02em;
    }

    .status {
      font-size: 13px;
      color: #8b949e;
      min-height: 18px;
      text-align: center;
    }

    .progress-bar {
      width: 200px;
      height: 3px;
      background: #21262d;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #63b3ed, #90cdf4);
      border-radius: 2px;
      animation: progress-indeterminate 1.5s ease-in-out infinite;
      transform-origin: left;
    }

    @keyframes progress-indeterminate {
      0%   { transform: scaleX(0) translateX(0); }
      50%  { transform: scaleX(0.6) translateX(70%); }
      100% { transform: scaleX(0) translateX(200%); }
    }

    .version {
      font-size: 11px;
      color: #484f58;
      position: absolute;
      bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="logo">🐺</div>
  <div class="title">DenAI</div>
  <div class="status" id="status">Iniciando...</div>
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
  <div class="version" id="version"></div>
  <script src="splash.js"></script>
</body>
</html>
