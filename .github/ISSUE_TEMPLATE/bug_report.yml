name: 🐛 Bug Report
description: Report a bug in DenAI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start DenAI with `python -m denai`
        2. Send message "..."
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Paste any relevant logs or error messages.
      render: shell

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., Windows 11, macOS 14, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g., 3.12.1"
    validations:
      required: true

  - type: input
    id: denai-version
    attributes:
      label: DenAI version
      placeholder: "e.g., 0.4.0 (run: python -m denai --version or pip show denai)"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Ollama model
      placeholder: "e.g., llama3.1:8b"
