name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=denai --cov-report=xml --cov-report=term-missing --cov-fail-under=75

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml

      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: lint-pip-${{ hashFiles('pyproject.toml') }}
      - run: pip install ruff
      - run: ruff check denai/ tests/
      - run: ruff format --check denai/ tests/

  # Auto-release: cria tag + GitHub Release + publica no PyPI
  # Roda apenas no push para main (não em PRs) e só após todos os testes passarem
  release:
    name: Auto Release
    needs: [test, lint]
    runs-on: ubuntu-latest
    # Apenas em push para main — nunca em PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # environment 'pypi' é necessário para trusted publishing OIDC
    environment:
      name: pypi
      url: https://pypi.org/p/denai
    permissions:
      contents: write   # para criar tags e releases
      id-token: write   # para trusted publishing no PyPI (OIDC)

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # histórico completo para verificar tags existentes

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Ler versão atual
        id: version
        run: |
          VERSION=$(python -c "from denai.version import VERSION; print(VERSION)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Versão detectada: $VERSION"

      - name: Verificar se tag já existe
        id: check_tag
        run: |
          if git tag --list | grep -qx "${{ steps.version.outputs.tag }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} já existe — sem release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} não existe — criando release"
          fi

      - name: Extrair notas de release do CHANGELOG
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          python3 - <<'PYEOF' > /tmp/release_notes.md
          import re
          version = "${{ steps.version.outputs.version }}"
          try:
              with open("CHANGELOG.md", "r", encoding="utf-8") as f:
                  content = f.read()
              pattern = rf"## \[{re.escape(version)}\].*?(?=\n## \[|\Z)"
              match = re.search(pattern, content, re.DOTALL)
              if match:
                  print(match.group(0).strip())
              else:
                  print(f"Release v{version}")
          except Exception:
              print(f"Release v{version}")
          PYEOF

      - name: Criar tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Criar GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false

      - name: Build do pacote
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publicar no PyPI
        if: steps.check_tag.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
