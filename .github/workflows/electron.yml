name: Build Electron

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da release (ex: v0.25.0)'
        required: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            uv_url: "https://github.com/astral-sh/uv/releases/download/0.6.14/uv-x86_64-pc-windows-msvc.zip"
            uv_bin: "uv-win32-x64.exe"
            uv_extract: "unzip -o /tmp/uv-win.zip -d /tmp/uv-win && mv /tmp/uv-win/uv.exe electron/bin/uv-win32-x64.exe"
          - os: macos-latest
            uv_url_arm64: "https://github.com/astral-sh/uv/releases/download/0.6.14/uv-aarch64-apple-darwin.tar.gz"
            uv_url_x64: "https://github.com/astral-sh/uv/releases/download/0.6.14/uv-x86_64-apple-darwin.tar.gz"
          - os: ubuntu-latest
            uv_url: "https://github.com/astral-sh/uv/releases/download/0.6.14/uv-x86_64-unknown-linux-gnu.tar.gz"
            uv_bin: "uv-linux-x64"
            uv_extract: "tar xz -C /tmp -f /tmp/uv.tar.gz && mv /tmp/uv-x86_64-unknown-linux-gnu/uv electron/bin/uv-linux-x64 && chmod +x electron/bin/uv-linux-x64"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Download uv binary (platform-specific)
        shell: bash
        run: |
          mkdir -p electron/bin
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            # arm64
            curl -fsSL "${{ matrix.uv_url_arm64 }}" | tar xz -C /tmp
            mv /tmp/uv-aarch64-apple-darwin/uv electron/bin/uv-darwin-arm64
            chmod +x electron/bin/uv-darwin-arm64
            # x64 (para cross-compile)
            curl -fsSL "${{ matrix.uv_url_x64 }}" | tar xz -C /tmp
            mv /tmp/uv-x86_64-apple-darwin/uv electron/bin/uv-darwin-x64
            chmod +x electron/bin/uv-darwin-x64
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            curl -fsSL "${{ matrix.uv_url }}" -o /tmp/uv-win.zip
            unzip -o /tmp/uv-win.zip -d /tmp/uv-win
            mv /tmp/uv-win/uv.exe electron/bin/uv-win32-x64.exe
          else
            curl -fsSL "${{ matrix.uv_url }}" | tar xz -C /tmp
            mv /tmp/uv-x86_64-unknown-linux-gnu/uv electron/bin/uv-linux-x64
            chmod +x electron/bin/uv-linux-x64
          fi
          echo "uv binaries: $(ls -lh electron/bin/)"

      - name: Install dependencies
        working-directory: electron
        run: npm ci

      - name: Sync version from Python
        working-directory: electron
        run: node scripts/sync-version.js

      - name: Make distributables (arm64)
        if: matrix.os == 'macos-latest'
        working-directory: electron
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run make -- --arch arm64

      - name: Make distributables (x64 cross-compile)
        if: matrix.os == 'macos-latest'
        working-directory: electron
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run make -- --arch x64

      - name: Make distributables (non-macOS)
        if: matrix.os != 'macos-latest'
        working-directory: electron
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORGE_ARCH: ${{ matrix.forge_arch }}
        run: |
          if [ -n "$FORGE_ARCH" ]; then
            npm run make -- --arch "$FORGE_ARCH"
          else
            npm run make
          fi

      - name: Upload artifacts to Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="${{ inputs.tag }}"
          fi
          echo "Uploading artifacts for tag: $TAG"

          # No macOS: renomear o segundo DMG (x64) para evitar clobber
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            # arm64 DMG (primeiro build: out/make/DenAI.dmg)
            ARM_DMG=$(find electron/out/make -name "DenAI.dmg" | head -1)
            if [ -n "$ARM_DMG" ]; then
              ARM_DEST="$(dirname "$ARM_DMG")/DenAI-arm64.dmg"
              cp "$ARM_DMG" "$ARM_DEST"
              gh release upload "$TAG" "$ARM_DEST" --clobber || true
            fi
            # x64 DMG (segundo build: out/make com arch=x64)
            X64_DMG=$(find electron/out/make -name "DenAI.dmg" | tail -1)
            if [ -n "$X64_DMG" ] && [ "$X64_DMG" != "$ARM_DMG" ]; then
              X64_DEST="$(dirname "$X64_DMG")/DenAI-x64.dmg"
              cp "$X64_DMG" "$X64_DEST"
              gh release upload "$TAG" "$X64_DEST" --clobber || true
            else
              # Fallback: se só houver um DMG, subir como arm64 e tentar x64
              find electron/out/make -name "*.dmg" | while read f; do
                gh release upload "$TAG" "$f" --clobber || true
              done
            fi
          else
            find electron/out/make -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.zip" \) | while read f; do
              echo "Uploading: $f"
              gh release upload "$TAG" "$f" --clobber || true
            done
          fi
