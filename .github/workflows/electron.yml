name: Build Electron

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da release (ex: v0.22.0)'
        required: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            uv_url: "https://github.com/astral-sh/uv/releases/download/0.6.14/uv-x86_64-pc-windows-msvc.zip"
            uv_bin: "uv-win32-x64.exe"
            uv_extract: "unzip -o /tmp/uv-win.zip -d /tmp/uv-win && mv /tmp/uv-win/uv.exe electron/bin/uv-win32-x64.exe"
          - os: macos-latest
            uv_url: "https://github.com/astral-sh/uv/releases/download/0.6.14/uv-aarch64-apple-darwin.tar.gz"
            uv_bin: "uv-darwin-arm64"
            uv_extract: "tar xz -C /tmp -f /tmp/uv.tar.gz && mv /tmp/uv-aarch64-apple-darwin/uv electron/bin/uv-darwin-arm64 && chmod +x electron/bin/uv-darwin-arm64"
            forge_arch: "arm64"
          - os: macos-13
            uv_url: "https://github.com/astral-sh/uv/releases/download/0.6.14/uv-x86_64-apple-darwin.tar.gz"
            uv_bin: "uv-darwin-x64"
            uv_extract: "tar xz -C /tmp -f /tmp/uv.tar.gz && mv /tmp/uv-x86_64-apple-darwin/uv electron/bin/uv-darwin-x64 && chmod +x electron/bin/uv-darwin-x64"
            forge_arch: "x64"
          - os: ubuntu-latest
            uv_url: "https://github.com/astral-sh/uv/releases/download/0.6.14/uv-x86_64-unknown-linux-gnu.tar.gz"
            uv_bin: "uv-linux-x64"
            uv_extract: "tar xz -C /tmp -f /tmp/uv.tar.gz && mv /tmp/uv-x86_64-unknown-linux-gnu/uv electron/bin/uv-linux-x64 && chmod +x electron/bin/uv-linux-x64"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Download uv binary (platform-specific)
        shell: bash
        run: |
          mkdir -p electron/bin
          curl -fsSL "${{ matrix.uv_url }}" -o /tmp/uv.tar.gz 2>/dev/null || \
            curl -fsSL "${{ matrix.uv_url }}" -o /tmp/uv-win.zip
          ${{ matrix.uv_extract }}
          echo "uv binary: $(ls -lh electron/bin/)"

      - name: Install dependencies
        working-directory: electron
        run: npm ci

      - name: Sync version from Python
        working-directory: electron
        run: node scripts/sync-version.js

      - name: Make distributables
        working-directory: electron
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ matrix.forge_arch }}" ]; then
            npm run make -- --arch ${{ matrix.forge_arch }}
          else
            npm run make
          fi

      - name: Upload artifacts to Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="${{ inputs.tag }}"
          fi
          echo "Uploading artifacts for tag: $TAG"
          find electron/out/make -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.zip" \) | while read f; do
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --clobber || true
          done
