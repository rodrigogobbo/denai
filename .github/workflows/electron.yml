name: Build Electron

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da release (ex: v0.21.0)'
        required: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Download uv binaries
        working-directory: electron
        shell: bash
        run: |
          mkdir -p bin
          UV_VERSION="0.6.14"
          BASE="https://github.com/astral-sh/uv/releases/download/${UV_VERSION}"

          # Darwin arm64
          curl -fsSL "${BASE}/uv-aarch64-apple-darwin.tar.gz" | tar xz -C /tmp
          mv /tmp/uv-aarch64-apple-darwin/uv bin/uv-darwin-arm64
          chmod +x bin/uv-darwin-arm64

          # Darwin x64
          curl -fsSL "${BASE}/uv-x86_64-apple-darwin.tar.gz" | tar xz -C /tmp
          mv /tmp/uv-x86_64-apple-darwin/uv bin/uv-darwin-x64
          chmod +x bin/uv-darwin-x64

          # Linux x64
          curl -fsSL "${BASE}/uv-x86_64-unknown-linux-gnu.tar.gz" | tar xz -C /tmp
          mv /tmp/uv-x86_64-unknown-linux-gnu/uv bin/uv-linux-x64
          chmod +x bin/uv-linux-x64

          # Windows x64
          curl -fsSL "${BASE}/uv-x86_64-pc-windows-msvc.zip" -o /tmp/uv-win.zip
          unzip -o /tmp/uv-win.zip -d /tmp/uv-win
          mv /tmp/uv-win/uv.exe bin/uv-win32-x64.exe

      - name: Install dependencies
        working-directory: electron
        run: npm ci

      - name: Sync version from Python
        working-directory: electron
        run: node scripts/sync-version.js

      - name: Make distributables
        working-directory: electron
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run make

      - name: Upload artifacts to Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="${{ inputs.tag }}"
          fi
          echo "Uploading artifacts for tag: $TAG"
          find electron/out/make -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.zip" \) | while read f; do
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --clobber || true
          done
