name: Build Electron

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da release (ex: v0.25.0)'
        required: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            uv_url: "https://github.com/astral-sh/uv/releases/download/0.6.14/uv-x86_64-pc-windows-msvc.zip"
            uv_bin: "uv-win32-x64.exe"
            uv_extract: "unzip -o /tmp/uv-win.zip -d /tmp/uv-win && mv /tmp/uv-win/uv.exe electron/bin/uv-win32-x64.exe"
          - os: macos-latest
            uv_url_arm64: "https://github.com/astral-sh/uv/releases/download/0.6.14/uv-aarch64-apple-darwin.tar.gz"
            uv_url_x64: "https://github.com/astral-sh/uv/releases/download/0.6.14/uv-x86_64-apple-darwin.tar.gz"
          - os: ubuntu-latest
            uv_url: "https://github.com/astral-sh/uv/releases/download/0.6.14/uv-x86_64-unknown-linux-gnu.tar.gz"
            uv_bin: "uv-linux-x64"
            uv_extract: "tar xz -C /tmp -f /tmp/uv.tar.gz && mv /tmp/uv-x86_64-unknown-linux-gnu/uv electron/bin/uv-linux-x64 && chmod +x electron/bin/uv-linux-x64"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Download uv binary (platform-specific)
        shell: bash
        run: |
          mkdir -p electron/bin
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            # arm64
            curl -fsSL "${{ matrix.uv_url_arm64 }}" | tar xz -C /tmp
            mv /tmp/uv-aarch64-apple-darwin/uv electron/bin/uv-darwin-arm64
            chmod +x electron/bin/uv-darwin-arm64
            # x64 (para cross-compile)
            curl -fsSL "${{ matrix.uv_url_x64 }}" | tar xz -C /tmp
            mv /tmp/uv-x86_64-apple-darwin/uv electron/bin/uv-darwin-x64
            chmod +x electron/bin/uv-darwin-x64
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            curl -fsSL "${{ matrix.uv_url }}" -o /tmp/uv-win.zip
            unzip -o /tmp/uv-win.zip -d /tmp/uv-win
            mv /tmp/uv-win/uv.exe electron/bin/uv-win32-x64.exe
          else
            curl -fsSL "${{ matrix.uv_url }}" | tar xz -C /tmp
            mv /tmp/uv-x86_64-unknown-linux-gnu/uv electron/bin/uv-linux-x64
            chmod +x electron/bin/uv-linux-x64
          fi
          echo "uv binaries: $(ls -lh electron/bin/)"

      - name: Install dependencies
        working-directory: electron
        run: npm ci

      - name: Sync version from Python
        working-directory: electron
        run: node scripts/sync-version.js

      - name: Generate icon.icns (macOS only)
        if: runner.os == 'macOS'
        working-directory: electron/assets
        shell: bash
        run: |
          mkdir -p /tmp/DenAI.iconset
          sips -z 16   16   icon.png --out /tmp/DenAI.iconset/icon_16x16.png
          sips -z 32   32   icon.png --out /tmp/DenAI.iconset/icon_16x16@2x.png
          sips -z 32   32   icon.png --out /tmp/DenAI.iconset/icon_32x32.png
          sips -z 64   64   icon.png --out /tmp/DenAI.iconset/icon_32x32@2x.png
          sips -z 128  128  icon.png --out /tmp/DenAI.iconset/icon_128x128.png
          sips -z 256  256  icon.png --out /tmp/DenAI.iconset/icon_128x128@2x.png
          sips -z 256  256  icon.png --out /tmp/DenAI.iconset/icon_256x256.png
          sips -z 512  512  icon.png --out /tmp/DenAI.iconset/icon_256x256@2x.png
          sips -z 512  512  icon.png --out /tmp/DenAI.iconset/icon_512x512.png
          cp icon.png /tmp/DenAI.iconset/icon_512x512@2x.png
          iconutil -c icns /tmp/DenAI.iconset -o icon.icns
          echo "icon.icns gerado: $(ls -lh icon.icns)"

      - name: Make distributables (arm64)
        if: runner.os == 'macOS'
        working-directory: electron
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run make -- --arch arm64

      - name: Make distributables (x64 cross-compile)
        if: runner.os == 'macOS'
        working-directory: electron
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run make -- --arch x64

      - name: Make distributables (non-macOS)
        if: matrix.os != 'macos-latest'
        working-directory: electron
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORGE_ARCH: ${{ matrix.forge_arch }}
        run: |
          if [ -n "$FORGE_ARCH" ]; then
            npm run make -- --arch "$FORGE_ARCH"
          else
            npm run make
          fi

      - name: Upload macOS artifacts (arm64 + x64)
        if: runner.os == 'macOS'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -z "$TAG" ] && TAG="${{ inputs.tag }}"
          # arm64 — renomear para DenAI-arm64.dmg
          find electron/out/make -name "DenAI.dmg" | while read f; do
            DEST="$(dirname "$f")/DenAI-arm64.dmg"
            cp "$f" "$DEST"
            echo "Uploading arm64: $DEST"
            gh release upload "$TAG" "$DEST" --clobber || true
          done
          # x64 — renomear para DenAI-x64.dmg
          find electron/out/make -name "DenAI.dmg" | while read f; do
            DEST="$(dirname "$f")/DenAI-x64.dmg"
            cp "$f" "$DEST"
            echo "Uploading x64: $DEST"
            gh release upload "$TAG" "$DEST" --clobber || true
          done

      - name: Upload non-macOS artifacts
        if: runner.os != 'macOS'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -z "$TAG" ] && TAG="${{ inputs.tag }}"
          find electron/out/make -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.zip" \) | while read f; do
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --clobber || true
          done
